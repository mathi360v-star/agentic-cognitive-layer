name: GH Swarm (Chunks 0-2)
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:

jobs:
  generate_and_stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2] 
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
        
      - name: Install Dependencies
        run: pip install langgraph langchain-core langchain-groq langchain-google-genai langchain-cohere langchain-openai langchain-mistralai pydantic chromadb tenacity huggingface_hub
        
      - name: Execute Swarm Logic
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          COHERE_API_KEYS: ${{ secrets.COHERE_API_KEYS }}
          CEREBRAS_API_KEYS: ${{ secrets.CEREBRAS_API_KEYS }}
          SAMBANOVA_API_KEYS: ${{ secrets.SAMBANOVA_API_KEYS }}
          MISTRAL_API_KEYS: ${{ secrets.MISTRAL_API_KEYS }}
        run: |
          python main.py --chunk ${{ matrix.chunk }} --total-chunks 9
          python utils/sanitizer.py

      - name: Direct-to-Vault Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          # GATE 2: Count the exact number of verified JSON lines in the file
          # The "|| echo 0" prevents the script from crashing if the file is completely missing
          VALID_LINES=$(wc -l < dataset/clean_training_data.jsonl 2>/dev/null || echo 0)
          
          echo "[SYSTEM] Detected $VALID_LINES verified traces ready for upload."

          if [ "$VALID_LINES" -gt 0 ]; then
            echo "[*] Connecting to Hugging Face..."
            sleep $((RANDOM % 10 + 1))
            
            huggingface-cli upload $HF_USERNAME/Agentic-Reasoning-Data dataset/clean_training_data.jsonl data/github_chunk_${{ matrix.chunk }}.jsonl --repo-type dataset
            
            echo "[+] Upload complete. Data secured."
          else
            echo "[-] Zero verified traces detected. Vault locked. Skipping upload to prevent data corruption."
          fi