name: STEM Swarm V3 (Parallel Harvest)
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *' # Optional: Run every 6 hours automatically

jobs:
  swarm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3, 4, 5] 
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: 
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs
        
      - name: Install System Dependencies & Python Packages
        run: |
          # 1. Install C++ build tools required for ChromaDB
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev
          
          # 2. Upgrade pip to ensure it can find binary wheels
          python -m pip install --upgrade pip
          
          # 3. Install the manifest
          pip install -r requirements.txt
        
      - name: Execute Autonomous Reasoning Loop
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          COHERE_API_KEYS: ${{ secrets.COHERE_API_KEYS }}
          SAMBANOVA_API_KEYS: ${{ secrets.SAMBANOVA_API_KEYS }}
          MISTRAL_API_KEYS: ${{ secrets.MISTRAL_API_KEYS }}
        run: |
          python main.py --chunk ${{ matrix.chunk }} --total-chunks 6
          python utils/sanitizer.py

      - name: Stream to Hugging Face Vault
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          CHUNK_ID: ${{ matrix.chunk }}
        run: |
          sleep $((RANDOM % 10 + 1)) 
          python utils/upload_to_hf.py