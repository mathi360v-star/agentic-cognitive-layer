name: GH Swarm (Chunks 0-2)
on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:

jobs:
  generate_and_stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2] 
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
        
      - name: Install Dependencies
        run: pip install langgraph langchain-core langchain-groq langchain-google-genai langchain-cohere langchain-openai langchain-mistralai pydantic chromadb tenacity huggingface_hub
        
      - name: Execute Swarm Logic
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
          COHERE_API_KEYS: ${{ secrets.COHERE_API_KEYS }}
          CEREBRAS_API_KEYS: ${{ secrets.CEREBRAS_API_KEYS }}
          SAMBANOVA_API_KEYS: ${{ secrets.SAMBANOVA_API_KEYS }}
          MISTRAL_API_KEYS: ${{ secrets.MISTRAL_API_KEYS }}
        run: |
          python main.py --chunk ${{ matrix.chunk }} --total-chunks 9
          python utils/sanitizer.py

      - name: Direct-to-Vault Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          CHUNK_ID: ${{ matrix.chunk }}
        run: |
          # GATE 2: Count the exact number of verified JSON lines
          VALID_LINES=$(wc -l < dataset/clean_training_data.jsonl 2>/dev/null || echo 0)
          
          echo "[SYSTEM] Detected $VALID_LINES verified traces ready for upload."

          if [ "$VALID_LINES" -gt 0 ]; then
            echo "[*] Connecting to Hugging Face via Pure Python API..."
            sleep $((RANDOM % 5 + 1))
            
            # THE ENTERPRISE FIX: Python Here-Doc (EOF) bypasses YAML quote parsing errors completely
            python - <<EOF
import os
from huggingface_hub import HfApi

try:
    api = HfApi()
    repo_id = f'{os.environ["HF_USERNAME"]}/Agentic-Reasoning-Data'
    file_path = f'data/github_chunk_{os.environ["CHUNK_ID"]}.jsonl'
    
    print(f'[*] Uploading to {repo_id} -> {file_path}...')
    
    api.upload_file(
        path_or_fileobj='dataset/clean_training_data.jsonl',
        path_in_repo=file_path,
        repo_id=repo_id,
        repo_type='dataset',
        token=os.environ['HF_TOKEN']
    )
    print('[+] PURE PYTHON UPLOAD COMPLETE. Data is secured in the vault.')
except Exception as e:
    print(f'[!] CRITICAL UPLOAD ERROR: {e}')
    exit(1)
EOF
            
          else
            echo "[-] Zero verified traces detected. Vault locked. Skipping upload to prevent data corruption."
          fi